; PlatformIO project configuration for ft8_lib on ESP32-S3 (Arduino framework)
; Linux host target for unit-testing the decode core without hardware.

[platformio]
default_envs = esp32s3
#default_envs = native

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board-level settings
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
upload_speed = 921600
monitor_speed = 115200
monitor_filters = default, esp32_exception_decoder, time


; Source & library layout
; pio_sources.py adds decode_ft8.c, ft8/*.c, fft/*.c, common/*.c explicitly.
; This avoids PlatformIO accidentally compiling main.c, gen_ft8.c, etc.
; The repo root must be on the include path so #include "ft8/..." etc. work.
build_flags =
    -std=gnu11
    -I.
    -DBOARD_HAS_PSRAM
    -DFT8_MAX_CANDIDATES=50 ; 50 is the default, but 25 is usually sufficient and much faster on a microcontroller
    -DFT8_LDPC_ITERATIONS=10 ; 10 is the default, but 5 is usually sufficient and much faster on a microcontroller
    -DFT8_MAX_DECODED_MSGS=200
    -DARDUINO_ARCH_ESP32=1
    -DLOG_LEVEL=LOG_DEBUG

; Scripts: stage WAV files for LittleFS, then add decode core sources to build
extra_scripts =
    pre:utils/pio_littlefs.py
    #pre:utils/pio_sources.py

; --------------------------------------------------------------------------
; Optional: native (Linux host) environment for fast iteration without board
; --------------------------------------------------------------------------
[env:native]
platform = native
build_flags =
    -I.
    -lm
    -lbsd
    -latomic
    -DNATIVE_BUILD
    -DLOG_LEVEL=LOG_DEBUG
extra_scripts =
    pre:utils/pio_sources.py


